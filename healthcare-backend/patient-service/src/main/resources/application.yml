server:
  port: 8082

spring:
  application:
    name: PATIENT-SERVICE

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/patient_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true